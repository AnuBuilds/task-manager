<div class="login-container">
  <mat-card class="login-card">
    <mat-card-header>
      <mat-card-title>Welcome Back</mat-card-title>
      <mat-card-subtitle>Login to Task Manager</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Username</mat-label>
        <input matInput [(ngModel)]="username" placeholder="Enter username" />
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Password</mat-label>
        <input matInput type="password" [(ngModel)]="password" placeholder="Enter password" />
      </mat-form-field>

      <p class="error" *ngIf="error">{{ error }}</p>
    </mat-card-content>

    <mat-card-actions>
      <button mat-raised-button color="primary" class="full-width" (click)="login()">
        Login
      </button>
      <button mat-button class="full-width" (click)="goToRegister()">
        Don't have an account? Register
      </button>
    </mat-card-actions>
  </mat-card>
</div>
